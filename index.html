<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos TakeAway</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #18bc9c; --light: #f8f9fa; }
        body { font-family: sans-serif; background-color: #d1d8e0; padding: 10px; margin: 0; }
        .card { background: white; max-width: 450px; margin: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 15px; text-align: center; }
        .form-section { padding: 15px; border-bottom: 1px solid #eee; }
        label { font-size: 0.8em; font-weight: bold; color: #666; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-add { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 6px; margin-top: 15px; cursor: pointer; font-weight: bold; }
        .btn-send { background: var(--secondary); color: white; border: none; width: 100%; padding: 15px; border-radius: 6px; margin-top: 20px; cursor: pointer; font-size: 1.1em; font-weight: bold; }
        .item-carrito { background: #f9f9f9; padding: 10px; margin-bottom: 5px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 0.9em; }
        #success-msg { display: none; color: var(--secondary); text-align: center; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>🍱 Nuevo Pedido</h2></div>
    <div class="form-section">
        <input type="text" id="nombre" placeholder="Nombre completo *" required>
        <input type="tel" id="telefono" placeholder="Teléfono de contacto *" required>
        <label>HORA DE RECOGIDA</label>
        <select id="hora"></select>
    </div>

    <div class="form-section">
        <label>PRODUCTO</label>
        <select id="producto"><option>Cargando lista...</option></select>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>CANT.</label><input type="number" id="cantidad" value="1" min="1"></div>
            <div style="flex:2"><label>TAMAÑO</label>
                <select id="peso">
                    <option value="250g">250g</option>
                    <option value="500g">500g</option>
                    <option value="Ración">Ración</option>
                </select>
            </div>
        </div>
        <label>NOTAS / ALERGIAS</label>
        <input type="text" id="notas" placeholder="Ej: Sin sal...">
        <button type="button" class="btn-add" onclick="agregar()">+ Añadir al Resumen</button>
    </div>

    <div class="form-section">
        <strong>Resumen del Pedido:</strong>
        <div id="carrito-lista" style="margin-top:10px;"></div>
        <div id="success-msg">✅ ¡Pedido enviado correctamente!</div>
        <button id="btnEnviar" class="btn-send" onclick="enviar()">Confirmar Pedido</button>
    </div>
</div>

<script>
    let carrito = [];
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxk0bFyaNv-W8Pm2I4eor5We1KCvH-92T0GllcFDLA8N_Kk-Uc2CV6HxJsMWBYC_wAc/exec';

    function generarHoras() {
        const sel = document.getElementById('hora');
        for(let h=20; h<=23; h++) {
            for(let m=0; m<60; m+=15) {
                if(h==23 && m>45) break;
                let texto = `${h}:${m==0?'00':m}`;
                sel.add(new Option(texto, texto));
            }
        }
    }

    async function cargarProds() {
        try {
            const res = await fetch(scriptURL);
            const prods = await res.json();
            const sel = document.getElementById('producto');
            sel.innerHTML = "";
            prods.forEach(p => sel.add(new Option(p, p)));
        } catch(e) { console.error(e); }
    }

    window.onload = () => { generarHoras(); cargarProds(); };

    function agregar() {
        const p = document.getElementById('producto').value;
        const c = document.getElementById('cantidad').value;
        const t = document.getElementById('peso').value;
        const n = document.getElementById('notas').value || "-";
        carrito.push({p, c, t, n});
        actualizarVista();
        document.getElementById('notas').value = "";
    }

    function actualizarVista() {
        const lista = document.getElementById('carrito-lista');
        lista.innerHTML = "";
        carrito.forEach((item, i) => {
            lista.innerHTML += `<div class="item-carrito">
                <span>${item.c}x ${item.p} (${item.t})</span>
                <button onclick="carrito.splice(${i},1);actualizarVista()" style="border:none;background:none;color:red;cursor:pointer;">✕</button>
            </div>`;
        });
    }

    async function enviar() {
        const nom = document.getElementById('nombre').value.trim();
        const tel = document.getElementById('telefono').value.trim();
        const hor = document.getElementById('hora').value;

        if(!nom || !tel || carrito.length === 0) return alert("Completa todos los campos y añade productos.");

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "Procesando...";

        const payload = {
            nombre: nom, telefono: tel, hora: hor,
            producto: carrito.map(i => i.p).join(" | "),
            cantidad: carrito.map(i => i.c).join(" | "),
            peso: carrito.map(i => i.t).join(" | "),
            notas: carrito.map(i => i.n).join(" | ")
        };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            document.getElementById('success-msg').style.display = 'block';
            btn.style.display = 'none';
            setTimeout(() => location.reload(), 3000);
        } catch(e) { alert("Error de conexión"); btn.disabled = false; }
    }
</script>
</body>
</html>
