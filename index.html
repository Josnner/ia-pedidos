<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TakeAway Dashboard</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #18bc9c; --accent: #2980b9; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #d1d8e0; padding: 10px; margin: 0; }
        .card { background: white; max-width: 480px; margin: auto; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .form-section { padding: 15px; border-bottom: 1px solid #eee; }
        label { font-size: 0.85em; font-weight: bold; color: #555; display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-add { background: var(--primary); color: white; }
        .btn-send { background: var(--secondary); color: white; font-size: 1.1em; }
        .btn-report { background: var(--accent); color: white; margin-top: 20px; }
        .item-carrito { background: var(--light); padding: 10px; margin-top: 5px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--secondary); }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 0.9em; }
        th { background: var(--accent); color: white; padding: 8px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <div class="header"><h2>🍱 Gestión de Pedidos</h2></div>
    
    <div class="form-section">
        <input type="text" id="nombre" placeholder="Nombre del cliente *" required>
        <input type="tel" id="telefono" placeholder="Teléfono *" required>
        <label>HORA DE RECOGIDA</label>
        <select id="hora"></select>
    </div>

    <div class="form-section">
        <label>PRODUCTO</label>
        <select id="producto"><option>Cargando lista...</option></select>
        <div style="display:flex; gap:10px;">
            <div style="flex:1"><label>CANT.</label><input type="number" id="cantidad" value="1" min="1"></div>
            <div style="flex:1"><label>PESO</label>
                <select id="peso">
                    <option value="250g">250g</option>
                    <option value="500g">500g</option>
                    <option value="Ración">Ración</option>
                </select>
            </div>
        </div>
        <label>NOTAS</label>
        <input type="text" id="notas" placeholder="Ej: Sin sal...">
        <button class="btn btn-add" onclick="agregar()">+ Añadir al Pedido</button>
    </div>

    <div class="form-section">
        <strong>Resumen Actual:</strong>
        <div id="lista-carrito"></div>
        <button id="btnEnviar" class="btn btn-send" style="margin-top:20px;" onclick="enviar()">Confirmar y Guardar</button>
        <div id="msg" style="display:none; text-align:center; color:green; font-weight:bold; margin-top:10px;">✅ ¡Guardado!</div>
    </div>

    <div class="form-section" style="background: #f0f7ff;">
        <strong>📊 PANEL DE COCINA</strong>
        <button class="btn btn-report" onclick="generarReporte()">Reportes</button>
        <div id="reporte-area" style="display:none;">
            <table id="tabla-reporte"></table>
        </div>
    </div>
</div>

<script>
    let carrito = [];
    // PONES AQUÍ TU URL DE GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyxrlXh5-ShVWxM0BDL5yjkM-rZlQ5Q6vjpM9Iz0MNHdAP8SZx_Tmb9eWlFwy3n-4_p/exec';

    function generarHoras() {
        const sel = document.getElementById('hora');
        for(let h=20; h<=23; h++) {
            for(let m=0; m<60; m+=15) {
                if(h==23 && m>45) break;
                let t = `${h}:${m==0?'00':m}`;
                sel.add(new Option(t, t));
            }
        }
    }

    async function cargarProds() {
        try {
            const res = await fetch(scriptURL);
            const prods = await res.json();
            const sel = document.getElementById('producto');
            sel.innerHTML = "";
            prods.forEach(p => sel.add(new Option(p, p)));
        } catch(e) { console.log(e); }
    }

    window.onload = () => { generarHoras(); cargarProds(); };

    function agregar() {
        const p = document.getElementById('producto').value;
        const c = document.getElementById('cantidad').value;
        const w = document.getElementById('peso').value;
        const n = document.getElementById('notas').value || "-";
        carrito.push({p, c, w, n});
        dibujar();
    }

    function dibujar() {
        const div = document.getElementById('lista-carrito');
        div.innerHTML = "";
        carrito.forEach((item, i) => {
            div.innerHTML += `<div class="item-carrito">
                <span>${item.c}x ${item.p} (${item.w})</span>
                <button onclick="carrito.splice(${i},1);dibujar()" style="color:red; border:none; background:none; cursor:pointer;">✕</button>
            </div>`;
        });
    }

    async function enviar() {
        const nom = document.getElementById('nombre').value;
        const tel = document.getElementById('telefono').value;
        const hor = document.getElementById('hora').value;
        if(!nom || !tel || carrito.length === 0) return alert("Faltan datos");

        const btn = document.getElementById('btnEnviar');
        btn.disabled = true; btn.innerText = "Guardando...";

        const payload = {
            nombre: nom, telefono: tel, hora: hor,
            producto: carrito.map(i => i.p).join(" | "),
            cantidad: carrito.map(i => i.c).join(" | "),
            pesos: carrito.map(i => i.w).join(" | "),
            notas: carrito.map(i => i.n).join(" | ")
        };

        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        document.getElementById('msg').style.display = 'block';
        setTimeout(() => location.reload(), 2000);
    }

   function generarReporte() {
    // Simplemente abrimos la central de reportes
    window.open('reporte.html', '_blank');
}
</script>
</body>
</html>
