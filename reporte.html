<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ticket de Cocina</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; padding: 20px; background: #fff; }
        .ticket { max-width: 400px; margin: auto; border: 1px solid #ccc; padding: 20px; }
        .header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; font-size: 1.2em; }
        th { text-align: left; }
        td { padding: 8px 0; border-bottom: 1px solid #eee; }
        .total-row { font-weight: bold; font-size: 1.4em; }
        .btn-print { background: #000; color: #fff; padding: 10px; width: 100%; border: none; cursor: pointer; margin-top: 20px; }
        @media print { .btn-print { display: none; } }
    </style>
</head>
<body>

<div class="ticket">
    <div class="header">
        <h1>REPORTE COCINA</h1>
        <h2 id="hora-reporte">--:--</h2>
        <p id="fecha-reporte"></p>
    </div>
    
    <table>
        <thead>
            <tr>
                <th>PRODUCTO</th>
                <th style="text-align: right;">CANT.</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            </tbody>
    </table>

    <button class="btn-print" onclick="window.print()">IMPRIMIR TICKET</button>
</div>

<script>
    window.onload = () => {
        // Recuperamos los datos guardados
        const rawData = localStorage.getItem('reporteCocina');
        if(!rawData) {
            document.body.innerHTML = "<h1>No hay datos para mostrar</h1>";
            return;
        }

        const data = JSON.parse(rawData);
        document.getElementById('hora-reporte').innerText = "TRAMO: " + data.hora;
        document.getElementById('fecha-reporte').innerText = data.fecha;

        const cuerpo = document.getElementById('tabla-cuerpo');
        for(const [prod, cant] of Object.entries(data.items)) {
            cuerpo.innerHTML += `
                <tr>
                    <td>${prod}</td>
                    <td style="text-align: right;" class="total-row">${cant}</td>
                </tr>`;
        }
    };
</script>
</body>
</html>
