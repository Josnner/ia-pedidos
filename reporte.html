<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes - TakeAway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; text-align: center; }
        
        .menu-reportes { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #e1e4e8; text-align: center; }
        .control-group { margin-bottom: 20px; }
        label { font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 10px; color: #666; }
        select { padding: 12px; border-radius: 8px; border: 2px solid #3498db; background: white; font-size: 1.1rem; width: 80%; cursor: pointer; }
        
        .botones-grid { display: flex; flex-direction: column; gap: 12px; }
        .btn { border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; font-size: 1rem; width: 100%; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #27ae60; }
        .btn:hover { opacity: 0.9; transform: scale(1.01); }
        
        #resultado { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #fcfcfc; }
        
        .total-qty { font-weight: bold; color: #2c3e50; font-size: 1.2em; text-align: right; }
        .badge { background: #3498db; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Control de Cocina</h1>
    
    <div class="menu-reportes">
        <div class="control-group">
            <label>SELECCIONA EL TRAMO HORARIO:</label>
            <select id="horaUnica"></select>
        </div>
        
        <div class="botones-grid">
            <button class="btn btn-blue" onclick="ejecutarReporte('pedidos')">Ver Total de Pedidos</button>
            <button class="btn btn-green" onclick="ejecutarReporte('mercancia')">Ver Peso de Mercancía</button>
        </div>
    </div>

    <div id="resultado">
        <p style="color: #888; text-align: center;">Elige una hora para consultar.</p>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzfFnSHdje8LNnkNyZGA0OHIBUVD7BiK0HGj28pVFUjaA83Iwv6_974X26I9c4oDiki/exec'; 

    function poblarSelector() {
        const selector = document.getElementById('horaUnica');
        for(let h=20; h<=23; h++) {
            for(let m=0; m<60; m+=15) {
                if(h==23 && m>45) break;
                let t = `${h}:${m==0?'00':m}`;
                selector.add(new Option(t, t));
            }
        }
    }

    window.onload = poblarSelector;

    async function ejecutarReporte(tipo) {
        const horaSeleccionada = document.getElementById('horaUnica').value;
        const div = document.getElementById('resultado');

        div.innerHTML = "<h3 style='text-align:center;'>Consultando base de datos...</h3>";

        try {
            const res = await fetch(`${scriptURL}?action=datosCompletos`);
            const data = await res.json();

            if (tipo === 'pedidos') {
                generarReportePedidos(data, horaSeleccionada);
            } else if (tipo === 'mercancia') {
                generarReporteMercancia(data, horaSeleccionada);
            }
        } catch (e) {
            div.innerHTML = "<p style='color:red; text-align:center;'>Error de conexión.</p>";
        }
    }

    function generarReportePedidos(data, horaBusqueda) {
        let totalPedidos = new Set();
        data.forEach(fila => {
            if (fila[2] === horaBusqueda) {
                totalPedidos.add(fila[7]); // ID Pedido
            }
        });

        if(totalPedidos.size === 0) { 
            document.getElementById('resultado').innerHTML = `<p style='text-align:center;'>No hay pedidos para las <strong>${horaBusqueda}</strong>.</p>`;
            return; 
        }

        document.getElementById('resultado').innerHTML = `
            <table>
                <tr><th>Tramo</th><th style="text-align:right;">Nº Pedidos</th></tr>
                <tr><td><strong>${horaBusqueda}</strong></td><td style="text-align:right;"><span class="badge">${totalPedidos.size}</span></td></tr>
            </table>`;
    }

    function generarReporteMercancia(data, horaBusqueda) {
        let totalesPeso = {}; 
        let totalesUnid = {}; 

        data.forEach(fila => {
            if (fila[2] === horaBusqueda) {
                let producto = fila[3];
                let cantidad = parseFloat(fila[4]) || 0;
                let pesoTexto = fila[5].toString().toLowerCase();

                let valorPeso = 0;
                if (pesoTexto.includes("250")) valorPeso = 250;
                else if (pesoTexto.includes("500")) valorPeso = 500;
                else if (pesoTexto.includes("ración") || pesoTexto.includes("racion")) valorPeso = 1;

                if (valorPeso > 1) {
                    totalesPeso[producto] = (totalesPeso[producto] || 0) + (cantidad * valorPeso);
                } else {
                    totalesUnid[producto] = (totalesUnid[producto] || 0) + cantidad;
                }
            }
        });

        const productos = [...new Set([...Object.keys(totalesPeso), ...Object.keys(totalesUnid)])].sort();
        
        if(productos.length === 0) { 
            document.getElementById('resultado').innerHTML = `<p style='text-align:center;'>Sin mercancía para las <strong>${horaBusqueda}</strong>.</p>`;
            return; 
        }

        let html = `<h2>Resumen para las ${horaBusqueda}</h2>
                    <table><tr><th>Producto</th><th style="text-align:right;">Peso Total</th></tr>`;
        productos.forEach(p => {
            let detalle = totalesPeso[p] 
                ? (totalesPeso[p] >= 1000 ? (totalesPeso[p]/1000).toFixed(2) + " Kg" : totalesPeso[p] + " g")
                : totalesUnid[p] + " Rac.";
            html += `<tr><td><strong>${p}</strong></td><td class="total-qty">${detalle}</td></tr>`;
        });
        document.getElementById('resultado').innerHTML = html + "</table>";
    }
</script>
</body>
</html>
