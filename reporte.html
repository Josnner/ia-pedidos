<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Centro de Reportes - TakeAway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .menu-reportes { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .btn-menu { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-menu:hover { background: #2980b9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #f9f9f9; }
        .badge { background: #e74c3c; color: white; padding: 4px 8px; border-radius: 12px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Centro de Control de Reportes</h1>
    
    <div class="menu-reportes">
        <button class="btn-menu" onclick="reporteTramos()">Reporte 1: Pedidos por Tramo (15m)</button>
        </div>

    <div id="resultado">
        <p>Selecciona un reporte arriba para visualizar los datos.</p>
    </div>
</div>

<script>
    // URL de tu Script de Google (la misma del index.html)
    const scriptURL = 'TU_URL_DE_DESPLIEGUE_AQUI';

    async function reporteTramos() {
        const div = document.getElementById('resultado');
        div.innerHTML = "<h3>Cargando datos...</h3>";

        try {
            const res = await fetch(`${scriptURL}?action=datosCompletos`);
            const data = await res.json();

            // Objeto para agrupar: { "20:00": 5, "20:15": 3... }
            let tramos = {};

            data.forEach(fila => {
                let hora = fila[2]; // Columna C: Hora
                let numPedido = fila[7]; // Columna H: Nº Pedido
                
                // Usamos una clave única (Hora + Nº Pedido) para no contar 
                // varias veces el mismo pedido si tiene varios productos
                let clavePedido = hora + "-" + numPedido;
                
                if (!tramos[hora]) {
                    tramos[hora] = new Set(); 
                }
                tramos[hora].add(numPedido);
            });

            // Generar la tabla
            let html = `<h2>Cantidad de Pedidos por Tramo</h2>
                        <table>
                            <tr>
                                <th>Tramo Horario</th>
                                <th>Total Pedidos</th>
                            </tr>`;

            // Ordenamos las horas
            const horasOrdenadas = Object.keys(tramos).sort();

            horasOrdenadas.forEach(h => {
                html += `<tr>
                            <td><strong>${h}</strong></td>
                            <td><span class="badge">${tramos[h].size}</span> pedidos</td>
                         </tr>`;
            });

            html += `</table>`;
            div.innerHTML = html;

        } catch (e) {
            div.innerHTML = "<p style='color:red;'>Error al obtener datos. Revisa la consola.</p>";
            console.error(e);
        }
    }
</script>
</body>
</html>
