<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes - TakeAway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        .menu-reportes { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #e1e4e8; }
        .controles { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; background: white; min-width: 120px; }
        
        .botones-grid { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #27ae60; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        
        #resultado { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #fcfcfc; }
        
        .error-box { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; text-align: center; font-weight: bold; }
        .badge { background: #3498db; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.9em; }
        .total-qty { font-weight: bold; color: #27ae60; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Centro de Control de Reportes</h1>
    
    <div class="menu-reportes">
        <div class="controles">
            <div class="control-group">
                <label>DESDE LAS:</label>
                <select id="horaInicio"></select>
            </div>
            <div class="control-group">
                <label>HASTA LAS:</label>
                <select id="horaFin"></select>
            </div>
        </div>
        
        <div class="botones-grid">
            <button class="btn btn-blue" onclick="ejecutarReporte('pedidos')">Reporte 1: Total Pedidos</button>
            <button class="btn btn-green" onclick="ejecutarReporte('mercancia')">Reporte 2: Mercancía a Preparar</button>
        </div>
    </div>

    <div id="resultado">
        <p style="color: #888; text-align: center;">Configura el rango y elige un reporte.</p>
    </div>
</div>

<script>
    const scriptURL = 'TU_URL_DE_DESPLIEGUE_AQUI'; // <--- CAMBIA ESTO

    function poblarSelectores() {
        const inicio = document.getElementById('horaInicio');
        const fin = document.getElementById('horaFin');
        for(let h=20; h<=23; h++) {
            for(let m=0; m<60; m+=15) {
                if(h==23 && m>45) break;
                let t = `${h}:${m==0?'00':m}`;
                inicio.add(new Option(t, t));
                fin.add(new Option(t, t));
            }
        }
        fin.value = "23:45";
    }

    window.onload = poblarSelectores;

    async function ejecutarReporte(tipo) {
        const hInicio = document.getElementById('horaInicio').value;
        const hFin = document.getElementById('horaFin').value;
        const div = document.getElementById('resultado');

        // VALIDACIÓN DE RANGO
        const numInicio = parseInt(hInicio.replace(':', ''));
        const numFin = parseInt(hFin.replace(':', ''));

        if (numInicio > numFin) {
            div.innerHTML = `<div class="error-box">⚠️ La hora de INICIO (${hInicio}) no puede ser mayor que la de FIN (${hFin}).</div>`;
            return;
        }

        div.innerHTML = "<h3>Consultando datos...</h3>";

        try {
            const res = await fetch(`${scriptURL}?action=datosCompletos`);
            const data = await res.json();

            if (tipo === 'pedidos') {
                generarReportePedidos(data, hInicio, hFin);
            } else if (tipo === 'mercancia') {
                generarReporteMercancia(data, hInicio, hFin);
            }

        } catch (e) {
            div.innerHTML = "<div class='error-box'>Error de conexión con Google Sheets.</div>";
        }
    }

    function generarReportePedidos(data, hInicio, hFin) {
        let tramos = {};
        data.forEach(fila => {
            let hora = fila[2];
            let numPedido = fila[7];
            if (hora >= hInicio && hora <= hFin) {
                if (!tramos[hora]) tramos[hora] = new Set();
                tramos[hora].add(numPedido);
            }
        });

        const horas = Object.keys(tramos).sort();
        if(horas.length === 0) { 
            document.getElementById('resultado').innerHTML = "<p>No hay pedidos en este rango.</p>";
            return; 
        }

        let html = `<h2>📦 Cantidad de Pedidos por Tramo</h2><table><tr><th>Hora</th><th>Total Clientes</th></tr>`;
        horas.forEach(h => {
            html += `<tr><td><strong>${h}</strong></td><td><span class="badge">${tramos[h].size} pedidos</span></td></tr>`;
        });
        document.getElementById('resultado').innerHTML = html + "</table>";
    }

    function generarReporteMercancia(data, hInicio, hFin) {
        let totales = {}; // { "CHOCO (250g)": 5 }
        data.forEach(fila => {
            let hora = fila[2];
            if (hora >= hInicio && hora <= hFin) {
                let nombre = fila[3]; // Producto
                let cant = parseFloat(fila[4]) || 0;
                let peso = fila[5]; // Peso
                let clave = `${nombre} [${peso}]`;
                
                totales[clave] = (totales[clave] || 0) + cant;
            }
        });

        const keys = Object.keys(totales).sort();
        if(keys.length === 0) { 
            document.getElementById('resultado').innerHTML = "<p>No hay mercancía para preparar en este rango.</p>";
            return; 
        }

        let html = `<h2>👨‍🍳 Mercancía Necesaria (${hInicio} - ${hFin})</h2>
                    <table><tr><th>Producto y Formato</th><th>Cantidad Total</th></tr>`;
        keys.forEach(k => {
            html += `<tr><td>${k}</td><td class="total-qty">${totales[k]}</td></tr>`;
        });
        document.getElementById('resultado').innerHTML = html + "</table>";
    }
</script>
</body>
</html>
