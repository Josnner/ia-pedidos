<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro de Reportes - TakeAway</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; text-align: center; }
        
        .menu-reportes { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #e1e4e8; }
        .controles { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .control-group { display: flex; flex-direction: column; width: 45%; }
        label { font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        select { padding: 12px; border-radius: 6px; border: 1px solid #ccc; background: white; font-size: 1rem; }
        
        /* Botones en vertical */
        .botones-grid { display: flex; flex-direction: column; gap: 12px; }
        .btn { border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; font-size: 1rem; width: 100%; }
        .btn-blue { background: #3498db; }
        .btn-green { background: #27ae60; }
        .btn:hover { opacity: 0.9; transform: scale(1.01); }
        
        #resultado { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background: #fcfcfc; }
        
        .error-box { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; border: 1px solid #f5c6cb; text-align: center; font-weight: bold; }
        .badge { background: #3498db; color: white; padding: 5px 12px; border-radius: 20px; font-size: 0.9em; }
        .total-qty { font-weight: bold; color: #2c3e50; font-size: 1.2em; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Control de Cocina</h1>
    
    <div class="menu-reportes">
        <div class="controles">
            <div class="control-group">
                <label>DESDE LAS:</label>
                <select id="horaInicio"></select>
            </div>
            <div class="control-group">
                <label>HASTA LAS:</label>
                <select id="horaFin"></select>
            </div>
        </div>
        
        <div class="botones-grid">
            <button class="btn btn-blue" onclick="ejecutarReporte('pedidos')">1. Cantidad de Pedidos (Tickets)</button>
            <button class="btn btn-green" onclick="ejecutarReporte('mercancia')">2. Peso Total por Producto (Gramos/Kg)</button>
        </div>
    </div>

    <div id="resultado">
        <p style="color: #888; text-align: center;">Selecciona el rango y el tipo de informe.</p>
    </div>
</div>

<script>
    // RECUERDA PONER TU URL AQUÍ
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyxrlXh5-ShVWxM0BDL5yjkM-rZlQ5Q6vjpM9Iz0MNHdAP8SZx_Tmb9eWlFwy3n-4_p/exec'; 

    function poblarSelectores() {
        const inicio = document.getElementById('horaInicio');
        const fin = document.getElementById('horaFin');
        for(let h=20; h<=23; h++) {
            for(let m=0; m<60; m+=15) {
                if(h==23 && m>45) break;
                let t = `${h}:${m==0?'00':m}`;
                inicio.add(new Option(t, t));
                fin.add(new Option(t, t));
            }
        }
        fin.value = "23:45";
    }

    window.onload = poblarSelectores;

    async function ejecutarReporte(tipo) {
        const hInicio = document.getElementById('horaInicio').value;
        const hFin = document.getElementById('horaFin').value;
        const div = document.getElementById('resultado');

        const numInicio = parseInt(hInicio.replace(':', ''));
        const numFin = parseInt(hFin.replace(':', ''));

        if (numInicio > numFin) {
            div.innerHTML = `<div class="error-box">⚠️ La hora de INICIO no puede ser posterior a la de FIN.</div>`;
            return;
        }

        div.innerHTML = "<h3 style='text-align:center;'>Buscando en la base de datos...</h3>";

        try {
            const res = await fetch(`${scriptURL}?action=datosCompletos`);
            const data = await res.json();

            if (tipo === 'pedidos') {
                generarReportePedidos(data, hInicio, hFin);
            } else if (tipo === 'mercancia') {
                generarReporteMercancia(data, hInicio, hFin);
            }
        } catch (e) {
            div.innerHTML = "<div class='error-box'>Error de conexión. Verifica la URL del script.</div>";
        }
    }

    function generarReportePedidos(data, hInicio, hFin) {
        let tramos = {};
        data.forEach(fila => {
            let hora = fila[2];
            let numPedido = fila[7];
            if (hora >= hInicio && hora <= hFin) {
                if (!tramos[hora]) tramos[hora] = new Set();
                tramos[hora].add(numPedido);
            }
        });

        const horas = Object.keys(tramos).sort();
        if(horas.length === 0) { 
            document.getElementById('resultado').innerHTML = "<p style='text-align:center;'>No hay pedidos registrados en este horario.</p>";
            return; 
        }

        let html = `<h2>Tickets por Tramo</h2><table><tr><th>Hora</th><th>Nº Pedidos</th></tr>`;
        horas.forEach(h => {
            html += `<tr><td><strong>${h}</strong></td><td><span class="badge">${tramos[h].size} pedidos</span></td></tr>`;
        });
        document.getElementById('resultado').innerHTML = html + "</table>";
    }

    function generarReporteMercancia(data, hInicio, hFin) {
        let totalesPeso = {}; 
        let totalesUnid = {}; 

        data.forEach(fila => {
            let hora = fila[2];
            if (hora >= hInicio && hora <= hFin) {
                let producto = fila[3];
                let cantidad = parseFloat(fila[4]) || 0;
                let pesoTexto = fila[5].toString().toLowerCase();

                let valorPeso = 0;
                if (pesoTexto.includes("250")) valorPeso = 250;
                else if (pesoTexto.includes("500")) valorPeso = 500;
                else if (pesoTexto.includes("ración") || pesoTexto.includes("racion")) valorPeso = 1;

                if (valorPeso > 1) {
                    totalesPeso[producto] = (totalesPeso[producto] || 0) + (cantidad * valorPeso);
                } else {
                    totalesUnid[producto] = (totalesUnid[producto] || 0) + cantidad;
                }
            }
        });

        const productos = [...new Set([...Object.keys(totalesPeso), ...Object.keys(totalesUnid)])].sort();
        
        if(productos.length === 0) { 
            document.getElementById('resultado').innerHTML = "<p style='text-align:center;'>No hay mercancía para este rango.</p>";
            return; 
        }

        let html = `<h2>Mercancía Total (${hInicio} - ${hFin})</h2>
                    <table><tr><th>Producto</th><th style="text-align:right;">Total a Preparar</th></tr>`;
        productos.forEach(p => {
            let detalle = "";
            if (totalesPeso[p]) {
                let gramos = totalesPeso[p];
                detalle = gramos >= 1000 ? (gramos/1000).toFixed(2) + " Kg" : gramos + " g";
            } else {
                detalle = totalesUnid[p] + " Raciones";
            }
            html += `<tr><td><strong>${p}</strong></td><td class="total-qty">${detalle}</td></tr>`;
        });
        document.getElementById('resultado').innerHTML = html + "</table>";
    }
</script>
</body>
</html>
